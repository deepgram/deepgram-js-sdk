<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing Management - Deepgram SDK</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    label {
      font-weight: 600;
      display: block;
      margin-top: 10px;
    }
    button {
      background: #0066ff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin: 5px 5px 5px 0;
    }
    button:hover {
      background: #0052cc;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #output {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 600px;
      overflow-y: auto;
    }
    .error {
      color: #d32f2f;
    }
    .success {
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <h1>Billing Management</h1>
  <p>Retrieve detailed billing information including balances, breakdowns, purchases, and available billing fields.</p>

  <div class="container">
    <label for="projectId">Project ID:</label>
    <input type="text" id="projectId" placeholder="Enter your Deepgram project ID">

    <label for="grouping">Group Billing By:</label>
    <select id="grouping">
      <option value="">No Grouping</option>
      <option value="line_item">Line Item</option>
      <option value="accessor">Accessor (API Key)</option>
      <option value="deployment">Deployment Type</option>
      <option value="tags">Tags</option>
    </select>

    <label for="deployment">Filter by Deployment:</label>
    <select id="deployment">
      <option value="">All Deployments</option>
      <option value="hosted">Hosted</option>
      <option value="self_hosted">Self-Hosted</option>
    </select>

    <button id="getBalances">Get Balances</button>
    <button id="getBreakdown">Get Billing Breakdown</button>
    <button id="getPurchases">Get Purchase History</button>
    <button id="getFields">Get Billing Fields</button>
  </div>

  <div id="output"></div>

  <script src="deepgram.js"></script>
  <script>
    const { DeepgramClient } = deepgram;

    const projectIdInput = document.getElementById('projectId');
    const groupingSelect = document.getElementById('grouping');
    const deploymentSelect = document.getElementById('deployment');
    const getBalancesBtn = document.getElementById('getBalances');
    const getBreakdownBtn = document.getElementById('getBreakdown');
    const getPurchasesBtn = document.getElementById('getPurchases');
    const getFieldsBtn = document.getElementById('getFields');
    const output = document.getElementById('output');

    function log(message, type = 'info') {
      const div = document.createElement('div');
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      if (className) {
        div.className = className;
      }
      div.textContent = message;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function validateProjectId() {
      const projectId = projectIdInput.value.trim();
      if (!projectId) {
        log('Please enter a project ID', 'error');
        return null;
      }
      return projectId;
    }

    getBalancesBtn.addEventListener('click', async () => {
      const projectId = validateProjectId();
      if (!projectId) return;

      output.textContent = '';
      getBalancesBtn.disabled = true;
      log('Fetching account balances...\n');

      try {
        const deepgramClient = new DeepgramClient({
          apiKey: 'proxy',
          baseUrl: 'http://localhost:8001',
        });

        const data = await deepgramClient.manage.v1.projects.billing.balances.list(projectId);

        log(`✓ Account balances:\n${JSON.stringify(data, null, 2)}`, 'success');
      } catch (error) {
        log(`✗ Error: ${error.message}`, 'error');
        if (error.body) {
          log(`Error details: ${JSON.stringify(error.body, null, 2)}`, 'error');
        }
      } finally {
        getBalancesBtn.disabled = false;
      }
    });

    getBreakdownBtn.addEventListener('click', async () => {
      const projectId = validateProjectId();
      if (!projectId) return;

      output.textContent = '';
      getBreakdownBtn.disabled = true;
      log('Fetching billing breakdown...\n');

      try {
        const deepgramClient = new DeepgramClient({
          apiKey: 'proxy',
          baseUrl: 'http://localhost:8001',
        });

        const options = {};

        // Add grouping if selected
        const grouping = groupingSelect.value;
        if (grouping) {
          options.grouping = grouping;
        }

        // Add deployment filter if selected
        const deployment = deploymentSelect.value;
        if (deployment) {
          options.deployment = deployment;
        }

        const data = await deepgramClient.manage.v1.projects.billing.breakdown.list(projectId, options);

        log(`✓ Billing breakdown:\n${JSON.stringify(data, null, 2)}`, 'success');
      } catch (error) {
        log(`✗ Error: ${error.message}`, 'error');
        if (error.body) {
          log(`Error details: ${JSON.stringify(error.body, null, 2)}`, 'error');
        }
      } finally {
        getBreakdownBtn.disabled = false;
      }
    });

    getPurchasesBtn.addEventListener('click', async () => {
      const projectId = validateProjectId();
      if (!projectId) return;

      output.textContent = '';
      getPurchasesBtn.disabled = true;
      log('Fetching purchase history...\n');

      try {
        const deepgramClient = new DeepgramClient({
          apiKey: 'proxy',
          baseUrl: 'http://localhost:8001',
        });

        const data = await deepgramClient.manage.v1.projects.billing.purchases.list(projectId, {
          limit: 10,
        });

        log(`✓ Purchase history:\n${JSON.stringify(data, null, 2)}`, 'success');
      } catch (error) {
        log(`✗ Error: ${error.message}`, 'error');
        if (error.body) {
          log(`Error details: ${JSON.stringify(error.body, null, 2)}`, 'error');
        }
      } finally {
        getPurchasesBtn.disabled = false;
      }
    });

    getFieldsBtn.addEventListener('click', async () => {
      const projectId = validateProjectId();
      if (!projectId) return;

      output.textContent = '';
      getFieldsBtn.disabled = true;
      log('Fetching billing fields...\n');

      try {
        const deepgramClient = new DeepgramClient({
          apiKey: 'proxy',
          baseUrl: 'http://localhost:8001',
        });

        const data = await deepgramClient.manage.v1.projects.billing.fields.list(projectId);

        log(`✓ Available billing fields:\n${JSON.stringify(data, null, 2)}`, 'success');
      } catch (error) {
        log(`✗ Error: ${error.message}`, 'error');
        if (error.body) {
          log(`Error details: ${JSON.stringify(error.body, null, 2)}`, 'error');
        }
      } finally {
        getFieldsBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
