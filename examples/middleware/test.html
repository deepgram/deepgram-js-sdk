<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepgram Middleware Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section h2::before {
            content: '🔧';
            font-size: 24px;
        }

        .endpoint-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .endpoint-btn {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .endpoint-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .endpoint-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .test-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }

        .test-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .test-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output:empty::before {
            content: 'Test output will appear here...';
            color: #666;
            font-style: italic;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-left: 3px solid #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .log-success {
            border-left-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .log-error {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .log-info {
            border-left-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-ready {
            background: #10b981;
            color: white;
        }

        .status-testing {
            background: #f59e0b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Deepgram Middleware Test Suite</h1>
            <p>Test REST and WebSocket endpoints across different server implementations</p>
        </div>

        <div class="content">
            <div class="section">
                <h2>Select Server Endpoint</h2>
                <div class="endpoint-selector">
                    <button class="endpoint-btn active" data-port="3001" data-name="HTTP" data-token="false">
                        🔌 Raw HTTP<br>
                        <small>Port 3001</small>
                    </button>
                    <button class="endpoint-btn" data-port="3002" data-name="Express" data-token="false">
                        ⚡ Express<br>
                        <small>Port 3002</small>
                    </button>
                    <button class="endpoint-btn" data-port="3003" data-name="Fastify" data-token="false">
                        🚀 Fastify<br>
                        <small>Port 3003</small>
                    </button>
                    <button class="endpoint-btn" data-port="3004" data-name="JWT Auth (HTTP)" data-token="jwt">
                        🔑 HTTP + JWT<br>
                        <small>Port 3004</small>
                    </button>
                    <button class="endpoint-btn" data-port="3005" data-name="JWT Auth (Express)" data-token="jwt">
                        🔐 Express + JWT<br>
                        <small>Port 3005</small>
                    </button>
                    <button class="endpoint-btn" data-port="3006" data-name="JWT Auth (Fastify)" data-token="jwt">
                        🔒 Fastify + JWT<br>
                        <small>Port 3006</small>
                    </button>
                </div>
            </div>

            <div class="section">
                <h2>Deepgram Proxy Tests <span class="status status-ready">Ready</span></h2>
                <button class="test-btn" onclick="testREST()">🌐 Test REST API (Raw Fetch)</button>
                <button class="test-btn" onclick="testRESTWithSDK()">✨ Test REST API (Deepgram SDK)</button>
                <button class="test-btn" onclick="testWebSocket()">🔌 Test WebSocket</button>
                <button class="test-btn" onclick="runBothTests()">🚀 Run Both Tests</button>
            </div>

            <div class="section">
                <h2>Custom Route Tests <span class="status status-ready">Ready</span></h2>
                <button class="test-btn" onclick="testHealth()">🏥 Test /health</button>
                <button class="test-btn" onclick="testCustomJSON()">📝 Test /json</button>
            </div>

            <div class="section">
                <h2>Test Output</h2>
                <div class="output" id="output"></div>
            </div>
        </div>
    </div>

    <script src="deepgram.js"></script>
    <script>
        let selectedPort = 3001;
        let selectedName = 'HTTP';
        let isTokenAuth = false;
        let isJWTAuth = false;

        // Endpoint selection
        document.querySelectorAll('.endpoint-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPort = parseInt(btn.dataset.port, 10);  // Convert to number
                selectedName = btn.dataset.name;
                isJWTAuth = btn.dataset.token === 'jwt';
                isTokenAuth = isJWTAuth;  // Keep compatibility
                log(`✅ Selected ${selectedName} endpoint (port ${selectedPort})`, 'info');
            });
        });

        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }

        function clearLog() {
            document.getElementById('output').innerHTML = '';
        }

        function setStatus(text, isActive) {
            const status = document.querySelector('.status');
            status.textContent = text;
            status.className = `status ${isActive ? 'status-testing' : 'status-ready'}`;
        }

        async function testREST() {
            clearLog();
            setStatus('Testing...', true);
            log(`🌐 Testing REST API on ${selectedName} (port ${selectedPort})...`, 'info');

            let token = null;

            try {
                // Step 1: Get JWT token if using JWT Auth
                if (isJWTAuth) {
                    log('🔑 Step 1: Requesting JWT token...', 'info');
                    const tokenUrl = `http://localhost:${selectedPort}/api/deepgram/token`;
                    log(`📤 POST ${tokenUrl}`, 'info');

                    const tokenResponse = await fetch(tokenUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ttlSeconds: 3600 })
                    });

                    if (!tokenResponse.ok) {
                        throw new Error(`Token request failed: ${tokenResponse.status}`);
                    }

                    const tokenData = await tokenResponse.json();
                    token = tokenData.token;
                    log(`✅ Received JWT token: ${token.substring(0, 20)}...`, 'success');
                    log(`⏰ Token expires in: ${tokenData.expiresIn} seconds`, 'info');
                    log('', 'info'); // Blank line for readability
                }

                // Step 2: Make the actual transcription request
                const url = `http://localhost:${selectedPort}/api/deepgram/v1/listen?model=nova-2`;
                log(`🌐 Step ${isTokenAuth ? '2' : '1'}: Testing transcription...`, 'info');
                log(`📤 Sending POST request to: ${url}`, 'info');
                log('📝 Request body: {"url": "https://dpgr.am/spacewalk.wav"}', 'info');

                const headers = {
                    'Content-Type': 'application/json',
                };

                // Add token to Authorization header if using JWT auth
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;  // JWT tokens use Bearer format
                    log(`🔐 Using JWT token for authentication`, 'info');
                }

                const startTime = Date.now();

                const response = await fetch(url, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        url: 'https://dpgr.am/spacewalk.wav'
                    })
                });

                const elapsed = Date.now() - startTime;
                log(`⏱️ Request took ${elapsed}ms`, 'info');

                log(`📥 Response status: ${response.status} ${response.statusText}`,
                    response.ok ? 'success' : 'error');

                log(`📋 Response headers: ${JSON.stringify(Object.fromEntries(response.headers))}`, 'info');

                const data = await response.json();
                log(`📊 Response data: ${JSON.stringify(data, null, 2)}`, 'success');

                if (data.results?.channels?.[0]?.alternatives?.[0]?.transcript) {
                    const transcript = data.results.channels[0].alternatives[0].transcript;
                    log(`📝 Transcript: "${transcript}"`, 'success');
                    log('✅ REST API test PASSED!', 'success');

                    if (isJWTAuth) {
                        log('✨ JWT authentication flow completed successfully!', 'success');
                        log('🔐 The proxy verified the JWT and used the server API key!', 'success');
                    }
                } else {
                    log('⚠️ Response structure unexpected', 'error');
                }
            } catch (error) {
                log(`❌ REST API test FAILED: ${error.message}`, 'error');
                console.error('REST Error:', error);
            }

            setStatus('Ready', false);
        }

        async function testRESTWithSDK() {
            clearLog();
            setStatus('Testing...', true);
            log(`✨ Testing REST API with Deepgram SDK on ${selectedName} (port ${selectedPort})...`, 'info');

            try {
                // Check if SDK is loaded
                if (!window.deepgram || !window.deepgram.DeepgramClient) {
                    throw new Error('Deepgram SDK not loaded');
                }

                const { DeepgramClient } = window.deepgram;
                let client;

                // Handle JWT auth vs basic proxy differently
                if (isJWTAuth) {
                    // JWT auth flow: Request JWT first, then create client with Bearer token
                    log('🔑 Step 1: Requesting JWT token from proxy...', 'info');
                    log(`📤 POST http://localhost:${selectedPort}/api/deepgram/token`, 'info');

                    const tokenResponse = await fetch(`http://localhost:${selectedPort}/api/deepgram/token`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ttlSeconds: 3600 })
                    });

                    if (!tokenResponse.ok) {
                        throw new Error(`Token request failed: ${tokenResponse.status}`);
                    }

                    const tokenData = await tokenResponse.json();
                    const token = tokenData.token;
                    const expiresIn = tokenData.expiresIn;

                    if (!token) {
                        throw new Error(`No token in response: ${JSON.stringify(tokenData)}`);
                    }

                    log(`✅ Received JWT: ${token.substring(0, 20)}...`, 'success');
                    log(`⏰ Token expires in: ${expiresIn} seconds`, 'info');
                    log('', 'info');
                    log('🌐 Step 2: Creating Deepgram client with JWT (Bearer format)...', 'info');
                    log(`🔗 Base URL: http://localhost:${selectedPort}/api/deepgram`, 'info');

                    client = new DeepgramClient({
                        apiKey: `Bearer ${token}`,  // JWT uses Bearer format
                        baseUrl: `http://localhost:${selectedPort}/api/deepgram`
                    });

                    log('✅ Deepgram client created with JWT Bearer token', 'success');
                } else {
                    // Basic proxy flow: Use dummy key, proxy handles authentication
                    log('📦 Creating Deepgram client with baseUrl configuration...', 'info');
                    log(`🔗 Base URL: http://localhost:${selectedPort}/api/deepgram`, 'info');

                    client = new DeepgramClient({
                        apiKey: 'Dummy key for SDK proxying',
                        baseUrl: `http://localhost:${selectedPort}/api/deepgram`
                    });

                    log('✅ Deepgram client created with dummy key (proxy will use server key)', 'success');
                }

                log('🌐 Sending transcription request via SDK...', 'info');
                log('📝 Request: transcribeUrl with model nova-2', 'info');

                const startTime = Date.now();

                // Use the SDK to make the request
                const result = await client.listen.v1.media.transcribeUrl({
                    url: 'https://dpgr.am/spacewalk.wav',
                    model: 'nova-2'
                });

                const elapsed = Date.now() - startTime;
                log(`⏱️ Request took ${elapsed}ms`, 'info');

                if (!result) {
                    throw new Error('No data returned from SDK');
                }

                log(`📊 Response data: ${JSON.stringify(result, null, 2)}`, 'success');

                if (result.results?.channels?.[0]?.alternatives?.[0]?.transcript) {
                    const transcript = result.results.channels[0].alternatives[0].transcript;
                    log(`📝 Transcript: "${transcript}"`, 'success');
                    log('', 'info');
                    log('✅ SDK REST API test PASSED!', 'success');

                    if (isJWTAuth) {
                        log('🎉 The complete JWT flow worked:', 'success');
                        log('  1. ✅ Proxy generated JWT signed with API key (HMAC256)', 'success');
                        log('  2. ✅ SDK sent JWT with Bearer format', 'success');
                        log('  3. ✅ Proxy verified JWT signature', 'success');
                        log('  4. ✅ Proxy used server API key to call Deepgram', 'success');
                        log('  5. ✅ API key never exposed to browser! 🔐', 'success');
                    } else {
                        log('✨ The SDK successfully used your proxy with the baseUrl configuration!', 'success');
                        log('🔐 Your API key stayed safe on the server!', 'success');
                    }
                } else {
                    log('⚠️ Response structure unexpected', 'error');
                }
            } catch (error) {
                log(`❌ SDK REST API test FAILED: ${error.message}`, 'error');
                console.error('SDK REST Error:', error);
            }

            setStatus('Ready', false);
        }

        async function testWebSocket() {
            clearLog();
            setStatus('Testing...', true);
            log(`🔌 Testing WebSocket on ${selectedName} (port ${selectedPort})...`, 'info');

            const wsUrl = `ws://localhost:${selectedPort}/api/deepgram/v1/listen?model=nova-2&encoding=linear16&sample_rate=16000`;

            try {
                log(`🔗 Connecting to: ${wsUrl}`, 'info');

                const ws = new WebSocket(wsUrl);
                let transcriptReceived = false;

                ws.onopen = () => {
                    log('✅ WebSocket connection opened', 'success');
                    log('📤 Sending test audio data...', 'info');

                    // Send a small test audio frame (silence)
                    const testAudio = new ArrayBuffer(3200); // 100ms of 16kHz mono
                    ws.send(testAudio);

                    // Close after 2 seconds
                    setTimeout(() => {
                        log('🔚 Closing connection...', 'info');
                        ws.close();
                    }, 2000);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log(`📨 Received message: ${JSON.stringify(data, null, 2)}`, 'info');

                        if (data.channel?.alternatives?.[0]?.transcript) {
                            transcriptReceived = true;
                            log(`📝 Transcript: "${data.channel.alternatives[0].transcript}"`, 'success');
                        }
                    } catch (e) {
                        log(`⚠️ Could not parse message: ${e.message}`, 'error');
                    }
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket error: ${error.message || 'Unknown error'}`, 'error');
                    console.error('WebSocket Error:', error);
                };

                ws.onclose = (event) => {
                    log(`🔌 WebSocket closed (code: ${event.code})`, 'info');

                    if (event.code === 1000) {
                        log('✅ WebSocket test PASSED!', 'success');
                    } else {
                        log(`⚠️ WebSocket closed with code ${event.code}`, 'error');
                    }

                    setStatus('Ready', false);
                };

            } catch (error) {
                log(`❌ WebSocket test FAILED: ${error.message}`, 'error');
                console.error('WebSocket Error:', error);
                setStatus('Ready', false);
            }
        }

        async function runBothTests() {
            clearLog();
            log('🚀 Running both REST and WebSocket tests...', 'info');
            log('═══════════════════════════════════════', 'info');

            await testREST();

            log('═══════════════════════════════════════', 'info');
            await new Promise(resolve => setTimeout(resolve, 1000));

            await testWebSocket();
        }

        async function testHealth() {
            if (!selectedPort) {
                log('❌ Please select an endpoint first!', 'error');
                return;
            }

            clearLog();
            setStatus('Testing...', true);

            log(`🏥 Testing /health on ${selectedName} (port ${selectedPort})...`, 'info');

            const url = `http://localhost:${selectedPort}/health`;

            try {
                log(`📤 Sending GET request to: ${url}`, 'info');

                const startTime = Date.now();
                const response = await fetch(url);
                const elapsed = Date.now() - startTime;

                log(`⏱️ Request took ${elapsed}ms`, 'info');
                log(`📥 Response status: ${response.status} ${response.statusText}`,
                    response.ok ? 'success' : 'error');

                const data = await response.json();
                log(`📊 Response: ${JSON.stringify(data, null, 2)}`, 'success');

                if (data.status === 'ok') {
                    log('✅ Health check PASSED!', 'success');
                } else {
                    log('⚠️ Unexpected health check response', 'error');
                }
            } catch (error) {
                log(`❌ Health check FAILED: ${error.message}`, 'error');
            } finally {
                setStatus('Ready', false);
            }
        }

        async function testCustomJSON() {
            if (!selectedPort) {
                log('❌ Please select an endpoint first!', 'error');
                return;
            }

            clearLog();
            setStatus('Testing...', true);

            log(`📝 Testing /json on ${selectedName} (port ${selectedPort})...`, 'info');

            const url = `http://localhost:${selectedPort}/json`;
            const testPayload = {
                message: "Hello from test suite!",
                timestamp: new Date().toISOString(),
                data: { foo: "bar", baz: 123 }
            };

            try {
                log(`📤 Sending POST request to: ${url}`, 'info');
                log(`📝 Payload: ${JSON.stringify(testPayload, null, 2)}`, 'info');

                const startTime = Date.now();
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testPayload)
                });
                const elapsed = Date.now() - startTime;

                log(`⏱️ Request took ${elapsed}ms`, 'info');
                log(`📥 Response status: ${response.status} ${response.statusText}`,
                    response.ok ? 'success' : 'error');

                const data = await response.json();
                log(`📊 Response: ${JSON.stringify(data, null, 2)}`, 'success');

                if (data.success && data.message === 'Custom route working!') {
                    log('✅ Custom JSON endpoint PASSED!', 'success');
                } else {
                    log('⚠️ Unexpected response structure', 'error');
                }
            } catch (error) {
                log(`❌ Custom JSON test FAILED: ${error.message}`, 'error');
            } finally {
                setStatus('Ready', false);
            }
        }

        // Initial log
        log('✅ Test suite initialized. Select an endpoint and run tests!', 'success');
    </script>
</body>
</html>
