name: ci
permissions:
  contents: read
on: [push, pull_request]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --no-optional=false

      - name: Compile
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 1

  examples:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --no-optional=false

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Run examples
        run: make examples
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DG_TOKEN }}
          DEEPGRAM_PROJECT_ID: ${{ secrets.DG_PROJECT_ID }}

  test:
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --no-optional=false

      - name: Install coverage provider
        run: pnpm add -D @vitest/coverage-v8@4

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Test with coverage
        run: |
          node scripts/fix-wire-test-imports.js
          pnpm exec vitest run --project unit --project wire \
            --coverage --coverage.provider=v8 \
            --coverage.reporter=cobertura --coverage.reporter=text

      - name: Test ESM
        run: make test-esm

      - name: Generate code coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          hide_complexity: true
          indicators: true
          output: both

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: code-coverage
          recreate: true
          path: code-coverage-results.md

      - name: Write coverage to job summary
        if: always()
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

  test-browser:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --no-optional=false

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Run browser tests
        run: make browser
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DG_TOKEN }}
          DEEPGRAM_PROJECT_ID: ${{ secrets.DG_PROJECT_ID }}
